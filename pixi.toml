[workspace]
authors = ["Tingfan Wu <tfw@amazon.com>"]
channels = ["conda-forge"]
name = "ipc_benchmark"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<3.13"
opencv = ">=4.13.0,<5"
numpy = ">=1.23,<3"
zenoh = ">=1.8.0,<2"
matplotlib = ">=3.10.8,<4"

[pypi-dependencies]
eclipse-zenoh = ">=1.8.0,<2"
ros2-pyterfaces = { version = ">=0.2.0, <0.3", extras = ["cyclone", "cydr"] }
lcm = ">=1.5.0"
