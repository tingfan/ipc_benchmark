syntax = "proto3";

package bench;

message Image {
  uint32 height = 1;
  uint32 width = 2;
  string encoding = 3;
  uint32 is_bigendian = 4;
  uint32 step = 5;
  bytes data = 6;
}

message JointState {
  repeated string name = 1;
  repeated double position = 2;
  repeated double velocity = 3;
  repeated double effort = 4;
}
